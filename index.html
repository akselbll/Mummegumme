<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mummegumme</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #f5ede0;
    font-family: 'Inter', sans-serif;
    color: #1a1008;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 1rem 3rem;
    overflow-x: hidden;
  }

  /* Paper grain texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
    opacity: 1; z-index: 0; pointer-events: none;
  }

  .content { position: relative; z-index: 1; width: 100%; max-width: 480px; display: flex; flex-direction: column; align-items: center; }

  /* Hero */
  .hero {
    width: 100%; text-align: center;
    padding: 1.5rem 1rem 1.25rem;
    border-bottom: 2px solid rgba(26,16,8,0.1);
    margin-bottom: 1.75rem;
  }
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 11vw, 5.5rem);
    letter-spacing: 4px; line-height: 1;
    color: #c0392b;
    text-align: center;
    margin: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: clip;
  }
  .hero .tagline {
    font-size: 0.8rem;
    color: rgba(26,16,8,0.45);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 0.4rem;
    text-align: center;
  }

  /* Game display */
  #name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 20vw, 6.5rem);
    text-align: center; letter-spacing: 2px; line-height: 1;
    transition: opacity 0.15s;
    color: #1a1008;
  }
  #name.unhinged-active { color: #c0392b; }

  #task-label {
    font-size: 1.2rem; font-weight: 700;
    color: #c0392b;
    text-align: center;
    margin-top: 0.5rem; padding: 0 1rem;
  }
  #bund-label {
    font-size: 1rem; color: #c0392b; font-weight: 700;
    text-align: center; margin-top: 0.25rem;
  }
  #emoji { font-size: 2.5rem; margin-top: 0.5rem; }

  #progress {
    width: 100%; max-width: 320px; height: 5px;
    background: rgba(26,16,8,0.1);
    border-radius: 4px; margin-top: 1.25rem; overflow: hidden;
  }
  #bar { height: 100%; background: #c0392b; border-radius: 4px; transition: width 0.1s linear; }
  #countdown { font-size: 0.85rem; color: rgba(26,16,8,0.4); margin-top: 0.5rem; letter-spacing: 1px; }

  /* Mode toggle */
  #mode-toggle {
    margin-top: 1.5rem; display: flex; align-items: center;
    gap: 0.75rem; font-size: 0.9rem; color: rgba(26,16,8,0.5);
    font-weight: 600;
  }
  .toggle-switch { position: relative; width: 48px; height: 26px; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .slider-track {
    position: absolute; cursor: pointer; inset: 0;
    background: rgba(26,16,8,0.15); border-radius: 26px; transition: background 0.3s;
  }
  .slider-track:before {
    content: ''; position: absolute; width: 20px; height: 20px;
    left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform 0.3s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  input:checked + .slider-track { background: #c0392b; }
  input:checked + .slider-track:before { transform: translateX(22px); }
  #mode-label.unhinged { color: #c0392b; font-weight: 700; }

  /* Settings */
  .settings { margin-top: 1.25rem; display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
  .setting { display: flex; flex-direction: column; align-items: center; gap: 0.35rem; transition: opacity 0.3s; }
  .setting.disabled { opacity: 0.25; pointer-events: none; }
  .setting label { font-size: 0.7rem; color: rgba(26,16,8,0.4); letter-spacing: 2px; text-transform: uppercase; }
  .setting input[type=range] { width: 120px; accent-color: #c0392b; }
  .setting span { font-size: 0.85rem; color: rgba(26,16,8,0.7); font-weight: 700; }

  /* Buttons */
  .btn-row { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
  button.primary {
    padding: 0.9rem 3rem;
    font-size: 1.2rem;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 3px;
    background: #c0392b;
    color: white; border: none; border-radius: 4px; cursor: pointer;
    box-shadow: 0 3px 0 #922b21;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  button.primary:hover { transform: translateY(-1px); box-shadow: 0 4px 0 #922b21; }
  button.primary:active { transform: translateY(2px); box-shadow: 0 1px 0 #922b21; }

  button.primary.stop {
    background: #5a1a1a;
    box-shadow: 0 3px 0 #3a0d0d;
  }
  button.primary.stop:hover { box-shadow: 0 4px 0 #3a0d0d; }
    padding: 0.9rem 1.5rem;
    font-size: 1.2rem;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 2px;
    background: white;
    color: #c0392b;
    border: 2px solid #c0392b;
    border-radius: 4px; cursor: pointer;
    display: none;
    box-shadow: 0 3px 0 #922b21;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  button#nextBtn:hover { transform: translateY(-1px); }
  button#nextBtn:active { transform: translateY(2px); box-shadow: 0 1px 0 #922b21; }

  /* Divider */
  .divider { width: 100%; border: none; border-top: 2px solid rgba(26,16,8,0.08); margin: 1.75rem 0 1.25rem; }

  /* Chips */
  #chip-section { width: 100%; }
  #chip-section h3 { font-size: 0.65rem; color: rgba(26,16,8,0.35); font-weight: 700; text-align: center; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 0.75rem; }
  #add-row { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
  #nameInput {
    flex: 1; padding: 0.55rem 0.9rem;
    border-radius: 4px;
    border: 1.5px solid rgba(26,16,8,0.2);
    background: white;
    color: #1a1008; font-size: 0.95rem; outline: none;
    transition: border-color 0.2s;
  }
  #nameInput::placeholder { color: rgba(26,16,8,0.3); }
  #nameInput:focus { border-color: #c0392b; }
  #addBtn {
    padding: 0.55rem 1.1rem;
    background: white; color: #c0392b;
    border: 1.5px solid #c0392b;
    border-radius: 4px; font-size: 1.2rem; cursor: pointer;
    transition: background 0.2s;
  }
  #addBtn:hover { background: #fdf0ee; }

  #chips { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; }
  .chip {
    display: flex; align-items: center; gap: 0.35rem;
    padding: 0.35rem 0.85rem; border-radius: 4px;
    font-size: 0.85rem; cursor: pointer;
    border: 1.5px solid rgba(26,16,8,0.15);
    background: white;
    color: rgba(26,16,8,0.45);
    transition: all 0.15s; user-select: none;
    font-weight: 600;
  }
  .chip:hover { border-color: #c0392b; color: #c0392b; }
  .chip.active { background: #c0392b; border-color: #c0392b; color: white; }
  .chip .remove { font-size: 0.7rem; opacity: 0.6; margin-left: 2px; }
  .chip.active .remove:hover { opacity: 1; }

  #active-label { margin-top: 0.75rem; font-size: 0.78rem; color: rgba(26,16,8,0.3); text-align: center; letter-spacing: 1px; }
  #save-hint { margin-top: 0.3rem; font-size: 0.72rem; color: rgba(26,16,8,0.2); text-align: center; }

  #support { margin-top: 2.5rem; text-align: center; }
  #supportBtn {
    display: inline-block;
    padding: 0.6rem 1.4rem;
    font-size: 0.85rem;
    font-weight: 600;
    color: rgba(26,16,8,0.4);
    border: 1.5px solid rgba(26,16,8,0.15);
    border-radius: 50px;
    text-decoration: none;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  #supportBtn:hover { color: #c0392b; border-color: #c0392b; }

  #lang-switch { width: 100%; display: flex; justify-content: flex-end; padding: 0.75rem 0.25rem 0; }
  #langBtn {
    padding: 0.35rem 0.8rem;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 1px;
    color: rgba(26,16,8,0.5);
    background: white;
    border: 1.5px solid rgba(26,16,8,0.15);
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
  }
  #langBtn:hover { color: #c0392b; border-color: #c0392b; }

  #footer {
    margin-top: 2rem;
    padding-top: 1.25rem;
    text-align: center;
    font-size: 0.8rem;
    color: rgba(26,16,8,0.4);
    letter-spacing: 0.5px;
  }
  #footer a {
    color: #c0392b;
    text-decoration: none;
    font-weight: 600;
  }
  #footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="content">
  <div id="lang-switch">
    <button id="langBtn" type="button" onclick="toggleLang()">EN</button>
  </div>
  <div class="hero">
    <h1>Mummegumme</h1>
    <div class="tagline" id="tagline">Ingen slipper tørt fra det</div>
  </div>

  <div id="name">Vælg navne</div>
  <div id="task-label"></div>
  <div id="bund-label"></div>
  <div id="emoji"></div>
  <div id="progress" style="display:none"><div id="bar" style="width:0%"></div></div>
  <div id="countdown"></div>

  <div id="mode-toggle">
    <span id="normalLabel">Normal</span>
    <label class="toggle-switch">
      <input type="checkbox" id="modeCheck" onchange="toggleMode()">
      <span class="slider-track"></span>
    </label>
    <span id="mode-label">Unhinged</span>
  </div>

  <div class="settings">
    <div class="setting" id="intervalSetting">
      <label id="intervalLabel">Interval</label>
      <input type="range" id="stepRange" min="1" max="30" value="5" oninput="updateSettings()">
      <span id="stepVal">5 sek</span>
    </div>
    <div class="setting">
      <label id="durationLabel">Varighed</label>
      <input type="range" id="totalRange" min="10" max="300" step="5" value="60" oninput="updateSettings()">
      <span id="totalVal">60 sek</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="primary" id="startStopBtn" onclick="handleStartStop()">Start</button>
    <button id="nextBtn" type="button" onclick="nextUnhinged()" style="display:none">Næste →</button>
  </div>

  <hr class="divider">

  <div id="chip-section">
    <h3 id="participantsLabel">Deltagere</h3>
    <div id="add-row">
      <input type="text" id="nameInput" placeholder="Tilføj navn..." autocomplete="off" autocorrect="off" autocapitalize="words">
      <button id="addBtn" type="button">+</button>
    </div>
    <div id="chips"></div>
    <div id="active-label">Ingen valgt</div>
    <div id="save-hint"></div>
  </div>

  <div id="support">
    <a href="https://qr.mobilepay.dk/box/d91d2f38-3f9c-4179-82d0-671ab51a6cde/pay-in" target="_blank" id="supportBtn">🍺 Køb os en øl</a>
  </div>

  <footer id="footer">
    ❤️ from us at <a href="https://www.copenhagendata.com" target="_blank" rel="noopener">Copenhagen Data</a>
  </footer>
</div>

<script>
  // --- Translations ---
  const I18N = {
    da: {
      tagline: 'Ingen slipper tørt fra det',
      chooseNames: 'Vælg navne',
      normal: 'Normal',
      unhinged: 'Unhinged',
      interval: 'Interval',
      duration: 'Varighed',
      start: 'Start',
      stop: 'Stop',
      next: 'Næste →',
      participants: 'Deltagere',
      addName: 'Tilføj navn...',
      noneSelected: 'Ingen valgt',
      selected: 'valgt',
      saveHint: 'Navne gemmes automatisk',
      support: '🍺 Køb os en øl',
      sec: 'sek',
      stopsIn: 'Stopper om',
      done: 'Færdig! \uD83C\uDF89',
      mustChoose: 'Vælg mindst ét navn først!',
      bunde: ' skal BUNDE! \uD83D\uDC80\uD83C\uDF7A',
      namedTasks: [
        'BUNDE!','BUNDE!','Vælg en der skal bunde med dig!',
        'De to ved siden af dig drikker!','Byt drink med naboen og drik den!',
        'Ring til en der ikke er her — de bestemmer hvem der drikker!',
        'Du vælger to der skal bunde!','BUNDE — og tag en til med!',
      ],
      groupTasks: ['Alle drikker!','Alle drikker dobbelt!','Sidste der rejser sig drikker!'],
    },
    en: {
      tagline: 'No one gets off dry',
      chooseNames: 'Pick names',
      normal: 'Normal',
      unhinged: 'Unhinged',
      interval: 'Interval',
      duration: 'Duration',
      start: 'Start',
      stop: 'Stop',
      next: 'Next →',
      participants: 'Players',
      addName: 'Add name...',
      noneSelected: 'None selected',
      selected: 'selected',
      saveHint: 'Names are saved automatically',
      support: '🍺 Buy us a beer',
      sec: 'sec',
      stopsIn: 'Stops in',
      done: 'Done! \uD83C\uDF89',
      mustChoose: 'Pick at least one name first!',
      bunde: ' must DOWN IT! \uD83D\uDC80\uD83C\uDF7A',
      namedTasks: [
        'DOWN IT!','DOWN IT!','Pick someone to down it with you!',
        'The two next to you drink!','Swap drinks with your neighbour and finish it!',
        'Call someone who isn\'t here — they decide who drinks!',
        'You pick two who must down it!','DOWN IT — and bring one more!',
      ],
      groupTasks: ['Everyone drinks!','Everyone drinks double!','Last to stand up drinks!'],
    },
  };

  const LANG_KEY = 'mummegumme_lang';
  let lang = 'da';
  try { const sl = localStorage.getItem(LANG_KEY); if (sl) lang = sl; } catch(e) {}

  function t() { return I18N[lang]; }
  function namedTasksFor() { return t().namedTasks; }
  function groupTasksFor() { return t().groupTasks; }

  const STORAGE_KEY = 'mummegumme_names';
  let allNames = [], active = new Set();
  let STEP = 5, TOTAL = 60, isUnhinged = false, audioCtx = null;
  let interval, timeout, tick, unhingedRunning = false;

  function applyLang() {
    const d = t();
    document.getElementById('langBtn').textContent = lang === 'da' ? 'EN' : 'DA';
    document.getElementById('tagline').textContent = d.tagline;
    document.getElementById('normalLabel').textContent = d.normal;
    document.getElementById('mode-label').textContent = d.unhinged;
    document.getElementById('intervalLabel').textContent = d.interval;
    document.getElementById('durationLabel').textContent = d.duration;
    document.getElementById('participantsLabel').textContent = d.participants;
    document.getElementById('nameInput').placeholder = d.addName;
    document.getElementById('supportBtn').textContent = d.support;
    document.getElementById('nextBtn').textContent = d.next;
    document.documentElement.lang = lang;
    // Only reset idle text if a game isn't running
    if (!unhingedRunning && document.getElementById('startStopBtn').textContent !== d.stop) {
      setBtn(false);
    }
    updateSettings();
    updateLabel();
  }

  function toggleLang() {
    lang = (lang === 'da') ? 'en' : 'da';
    try { localStorage.setItem(LANG_KEY, lang); } catch(e) {}
    applyLang();
  }

  function loadNames() {
    try { const s = localStorage.getItem(STORAGE_KEY); if (s) allNames = JSON.parse(s); } catch(e) {}
    renderChips();

    // Attach events here so they always fire regardless of browser quirks
    const btn = document.getElementById('addBtn');
    const input = document.getElementById('nameInput');

    btn.addEventListener('click', function(e) { e.preventDefault(); addName(); });
    btn.addEventListener('touchend', function(e) { e.preventDefault(); addName(); });
    input.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); addName(); } });
  }
  function saveNames() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(allNames)); } catch(e) {} }

  function renderChips() {
    const el = document.getElementById('chips');
    el.innerHTML = '';
    allNames.forEach(name => {
      const chip = document.createElement('div');
      chip.className = 'chip' + (active.has(name) ? ' active' : '');
      chip.innerHTML = name + '<span class="remove" onclick="event.stopPropagation();removeName(\'' + name.replace(/'/g,"\\'") + '\')">&#x2715;</span>';
      chip.onclick = () => { if(active.has(name)){active.delete(name);chip.classList.remove('active');}else{active.add(name);chip.classList.add('active');} updateLabel(); };
      el.appendChild(chip);
    });
    updateLabel();
  }

  function addName() {
    const input = document.getElementById('nameInput');
    const name = (input.value || '').trim();
    if (!name || allNames.includes(name)) { input.value = ''; return; }
    allNames.push(name);
    allNames.sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
    active.add(name);
    saveNames();
    input.value = '';
    renderChips();
  }

  function removeName(name) {
    allNames = allNames.filter(n => n !== name);
    active.delete(name); saveNames(); renderChips();
  }

  function updateLabel() {
    const d = t();
    document.getElementById('active-label').textContent = active.size === 0 ? d.noneSelected : active.size + ' ' + d.selected;
    document.getElementById('save-hint').textContent = allNames.length ? d.saveHint : '';
    if (active.size === 0 && !unhingedRunning) { document.getElementById('name').textContent = d.chooseNames; document.getElementById('emoji').textContent = ''; }
  }

  function toggleMode() {
    isUnhinged = document.getElementById('modeCheck').checked;
    document.getElementById('mode-label').className = isUnhinged ? 'unhinged' : '';
    document.getElementById('intervalSetting').className = isUnhinged ? 'setting disabled' : 'setting';
  }

  function updateSettings() {
    STEP = parseInt(document.getElementById('stepRange').value);
    TOTAL = parseInt(document.getElementById('totalRange').value);
    document.getElementById('stepVal').textContent = STEP + ' ' + t().sec;
    document.getElementById('totalVal').textContent = TOTAL + ' ' + t().sec;
  }

  function getAudioCtx() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }

  function playPop() {
    const ctx = getAudioCtx(), osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type='sine'; osc.frequency.setValueAtTime(600,ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(900,ctx.currentTime+0.05);
    gain.gain.setValueAtTime(0.3,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.15);
  }

  function playUnhingedPop() {
    const ctx = getAudioCtx();
    [0,0.08,0.16].forEach((delay,i) => {
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type='sawtooth'; osc.frequency.value=400+i*150;
      const t=ctx.currentTime+delay;
      gain.gain.setValueAtTime(0.2,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.12);
      osc.start(t); osc.stop(t+0.12);
    });
  }

  function playFanfare() {
    const ctx = getAudioCtx();
    [523,659,784,1047,784,1047].forEach((freq,i) => {
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type='triangle'; osc.frequency.value=freq;
      const t=ctx.currentTime+[0,0.15,0.3,0.45,0.65,0.8][i];
      gain.gain.setValueAtTime(0,t); gain.gain.linearRampToValueAtTime(0.4,t+0.05); gain.gain.exponentialRampToValueAtTime(0.001,t+0.25);
      osc.start(t); osc.stop(t+0.3);
    });
  }

  function pick(isFinal) {
    const persons = [...active];
    const el = document.getElementById('name');
    el.style.opacity = 0;
    setTimeout(() => {
      let chosen = null;
      let task = null;
      let isGroup = false;

      if (isUnhinged && !isFinal) {
        // 25% chance of a group task (no name)
        isGroup = Math.random() < 0.25;
        if (isGroup) {
          const gt = groupTasksFor();
          task = gt[Math.floor(Math.random() * gt.length)];
        } else {
          chosen = persons[Math.floor(Math.random() * persons.length)];
          const nt = namedTasksFor();
          task = nt[Math.floor(Math.random() * nt.length)];
        }
      } else {
        chosen = persons[Math.floor(Math.random() * persons.length)];
      }

      el.textContent = isGroup ? '' : chosen;
      el.className = isUnhinged ? 'unhinged-active' : '';
      document.getElementById('task-label').textContent = task || '';
      document.getElementById('emoji').textContent = isFinal ? '\uD83D\uDC80' : (isUnhinged ? '\uD83D\uDD25' : '\uD83C\uDF7A');
      document.getElementById('bund-label').textContent = isFinal && !isUnhinged ? chosen + t().bunde : '';
      el.style.opacity = 1;
      if (isFinal) playFanfare();
      else isUnhinged ? playUnhingedPop() : playPop();
    }, 200);
  }

  function startUnhinged() {
    unhingedRunning = true;
    document.getElementById('nextBtn').style.display = 'block';
    document.getElementById('countdown').textContent = '';
    document.getElementById('progress').style.display = 'none';
    pick(false);
    timeout = setTimeout(() => endGame(), TOTAL * 1000);
  }

  function nextUnhinged() {
    if (!unhingedRunning) return;
    pick(false);
  }

  function endGame() {
    clearTimeout(timeout);
    unhingedRunning = false;
    document.getElementById('nextBtn').style.display = 'none';
    document.getElementById('progress').style.display = '';
    updateBar(100);
    pick(true);
    document.getElementById('countdown').textContent = t().done;
    lockControls(false);
    setBtn(false);
  }

  function setBtn(running) {
    const btn = document.getElementById('startStopBtn');
    if (running) { btn.textContent = t().stop; btn.classList.add('stop'); }
    else { btn.textContent = t().start; btn.classList.remove('stop'); }
  }

  function handleStartStop() {
    const btn = document.getElementById('startStopBtn');
    if (btn.classList.contains('stop')) { resetGame(); } else { start(); }
  }

  function resetGame() {
    clearInterval(interval); clearInterval(tick); clearTimeout(timeout);
    unhingedRunning = false;
    document.getElementById('nextBtn').style.display = 'none';
    document.getElementById('name').textContent = t().chooseNames;
    document.getElementById('name').className = '';
    document.getElementById('task-label').textContent = '';
    document.getElementById('bund-label').textContent = '';
    document.getElementById('emoji').textContent = '';
    document.getElementById('countdown').textContent = '';
    document.getElementById('progress').style.display = 'none';
    updateBar(0);
    lockControls(false);
    setBtn(false);
  }

  function lockControls(locked) {
    document.getElementById('stepRange').disabled = locked;
    document.getElementById('totalRange').disabled = locked;
    document.getElementById('modeCheck').disabled = locked;
    document.querySelector('.settings').style.opacity = locked ? '0.4' : '1';
    document.getElementById('mode-toggle').style.opacity = locked ? '0.4' : '1';
    document.getElementById('mode-toggle').style.pointerEvents = locked ? 'none' : '';
  }

  function start() {
    if (active.size === 0) { alert(t().mustChoose); return; }
    window.scrollTo({top: 0, behavior: 'smooth'});
    getAudioCtx();
    clearInterval(interval); clearInterval(tick); clearTimeout(timeout);
    document.getElementById('bund-label').textContent = '';
    document.getElementById('task-label').textContent = '';
    document.getElementById('progress').style.display = '';
    lockControls(true);
    setBtn(true);
    if (isUnhinged) { startUnhinged(); return; }

    const totalStart = Date.now();
    let roundStart = Date.now();
    pick(false); updateBar(0);
    document.getElementById('countdown').textContent = t().stopsIn + ' ' + TOTAL + ' ' + t().sec;

    interval = setInterval(() => {
      pick(false);
      roundStart = Date.now();
    }, STEP * 1000);

    tick = setInterval(() => {
      const roundElapsed = (Date.now() - roundStart) / 1000;
      const totalElapsed = (Date.now() - totalStart) / 1000;
      updateBar(Math.min(roundElapsed / STEP * 100, 100));
      const left = Math.max(0, TOTAL - totalElapsed);
      document.getElementById('countdown').textContent = t().stopsIn + ' ' + Math.ceil(left) + ' ' + t().sec;
    }, 100);

    timeout = setTimeout(() => {
      clearInterval(interval); clearInterval(tick);
      pick(true);
      document.getElementById('countdown').textContent = t().done;
      updateBar(100);
      lockControls(false);
      setBtn(false);
    }, TOTAL * 1000);
  }

  function updateBar(pct) { document.getElementById('bar').style.width = pct+'%'; }

  loadNames();
  applyLang();
</script>
</body>
</html>
